<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Questions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="questions-page">
    <div class="container">
        <header class="header">
            <h1>Quiz Questions</h1>
            <p class="subtitle">Select a category to begin</p>
        </header>

        <main class="main-content">
            <div class="content-area">
                <section class="category-section">
                    <div class="card">
                        <h2>Select Categories</h2>
                        <div class="selection-counter">0/8 selected</div>
                        <div class="categories-grid">
                            <button class="category-btn" data-category="music">
                                <div class="category-icon">Music</div>
                                <span>Music</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="sports">
                                <div class="category-icon">Sports</div>
                                <span>Sports</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="science">
                                <div class="category-icon">Science</div>
                                <span>Science</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="history">
                                <div class="category-icon">History</div>
                                <span>History</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="geography">
                                <div class="category-icon">Geography</div>
                                <span>Geography</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="literature">
                                <div class="category-icon">Literature</div>
                                <span>Literature</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="movies">
                                <div class="category-icon">Movies</div>
                                <span>Movies</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="technology">
                                <div class="category-icon">Technology</div>
                                <span>Technology</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="art">
                                <div class="category-icon">Art</div>
                                <span>Art</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="food">
                                <div class="category-icon">Food</div>
                                <span>Food</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="nature">
                                <div class="category-icon">Nature</div>
                                <span>Nature</span>
                                <div class="selection-count"></div>
                            </button>
                            <button class="category-btn" data-category="games">
                                <div class="category-icon">Games</div>
                                <span>Games</span>
                                <div class="selection-count"></div>
                            </button>
                        </div>
                        <button class="start-quiz-btn hidden">Start Quiz</button>
                    </div>
                </section>

                <section class="start-countdown hidden">
                    <div class="card">
                        <div class="countdown-display">
                            <div class="countdown-number">3</div>
                            <div class="countdown-text">Get Ready!</div>
                        </div>
                    </div>
                </section>

                <section class="question-section hidden">
                    <div class="card">
                        <div class="question-header">
                            <div class="question-number">1 of 8</div>
                            <div class="category-indicator">Music</div>
                        </div>
                        <div class="question-content">
                            <h3 class="question-text">Question text will appear here</h3>
                            <div class="answer-options" style="display: none;">
                                <!-- Answer options will be generated dynamically -->
                            </div>
                        </div>
                        <div class="question-timer-container">
                            <div class="question-timer" id="questionTimer">30</div>
                        </div>
                    </div>
                </section>

                <section class="scoring-section hidden">
                    <div class="card">
                        <!-- Scoring content will be generated dynamically -->
                    </div>
                </section>
            </div>

            <div class="teams-sidebar">
                <h3>Teams</h3>
                <div id="teamsList">
                    <!-- Teams will be displayed here -->
                </div>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
