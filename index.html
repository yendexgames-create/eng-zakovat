<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="index-page">
    <div class="container">
        <main class="main-content">
            <header class="header hidden">
                <div class="header-content">
                    <div class="header-text">
                        <h1>Quiz Control Panel</h1>
                        <p class="subtitle">Set up your teams and start the quiz</p>
                    </div>
                    <div class="header-actions">
                        <button id="resetQuiz" class="btn btn-danger">Reset Quiz</button>
                    </div>
                </div>
            </header>
            
            <section class="setup-section">
                <div class="card">
                    <h2>Team Setup</h2>
                    
                    <div class="input-group">
                        <label for="teamCount">Number of Teams:</label>
                        <input type="number" id="teamCount" min="2" max="10" value="2" class="number-input">
                        <button id="generateInputs" class="btn btn-secondary">Generate Team Inputs</button>
                    </div>

                    <div id="teamInputs" class="team-inputs">
                        <div id="teamInputsContainer">
                            <!-- Team inputs will be generated here -->
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button id="startQuiz" class="btn btn-primary" disabled>Setup Quiz</button>
                    </div>
                    <div id="setupStatus" class="setup-status hidden">
                        <div class="status-message">
                            <h3>Quiz Setup Complete!</h3>
                        </div>
                    </div>
                    
                    <div id="scoringSection" class="scoring-section hidden">
                        <div class="card">
                            <h2>Score This Question</h2>
                            <div id="scoringQuestion" class="scoring-question"></div>
                            <div id="teamScores" class="team-scores">
                                <!-- Team scoring will be generated here -->
                            </div>
                            <div class="scoring-actions">
                                <button id="submitScores" class="btn btn-primary">Submit Scores</button>
                                <button id="skipScoring" class="btn btn-secondary">Skip Scoring</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scoring Modal -->
    <div id="scoringModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Score This Question</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalScoringQuestion" class="scoring-question">
                    <!-- Question will be displayed here -->
                </div>
                <div id="modalTeamScores" class="team-scores">
                    <!-- Team scoring buttons will be generated here -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="modalSubmitScores" class="btn btn-primary">Submit Scores</button>
                <button id="modalSkipScoring" class="btn btn-secondary">Skip Scoring</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
